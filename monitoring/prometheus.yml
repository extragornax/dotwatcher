global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: dotwatcher
    metrics_path: /metrics
    static_configs:
      # Same compose network as dotwatcher → reach it by service name.
      - targets: ["dotwatcher:9004"]
        labels:
          instance: dotwatcher

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
