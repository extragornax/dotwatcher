apiVersion: 1

providers:
  - name: dotwatcher
    orgId: 1
    folder: dotwatcher
    type: file
    # With a read-only bind-mount, Grafana must not try to delete files
    # or write edits back to disk.
    disableDeletion: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /etc/dashboards
      foldersFromFilesStructure: false
